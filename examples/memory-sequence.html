<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Neon Memory Sequence - Puzzle Game</title>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #0a0a1a;
            font-family: 'Orbitron', 'Segoe UI', sans-serif;
        }

        #game-ui {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 999;
            text-align: center;
            pointer-events: none;
            padding: 20px;
        }

        #title {
            font-size: 36px;
            color: #00ffff;
            text-shadow: 0 0 20px #00ffff, 0 0 40px #00ffff;
            margin: 0;
            letter-spacing: 8px;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 20px #00ffff, 0 0 40px #00ffff;
            }

            to {
                text-shadow: 0 0 30px #ff00ff, 0 0 60px #ff00ff, 0 0 80px #ff00ff;
            }
        }

        #score {
            font-size: 28px;
            color: #ff00ff;
            text-shadow: 0 0 15px #ff00ff;
            margin: 15px 0;
        }

        #level {
            font-size: 22px;
            color: #00ff88;
            text-shadow: 0 0 10px #00ff88;
        }

        #message {
            font-size: 24px;
            color: #ffff00;
            text-shadow: 0 0 15px #ffff00;
            min-height: 40px;
            margin-top: 10px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        #message.visible {
            opacity: 1;
        }

        #instructions {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 18px;
            color: rgba(255, 255, 255, 0.7);
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        #game-over {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 1000;
            background: radial-gradient(circle, rgba(10, 10, 30, 0.95) 0%, rgba(0, 0, 0, 0.98) 100%);
            text-align: center;
            padding-top: 100px;
        }

        #game-over h1 {
            font-size: 64px;
            color: #ff3366;
            text-shadow: 0 0 30px #ff3366, 0 0 60px #ff3366;
            margin: 0 0 30px 0;
            animation: pulse-red 1s ease-in-out infinite;
        }

        @keyframes pulse-red {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }
        }

        #game-over p {
            font-size: 28px;
            color: white;
            margin: 15px 0;
        }

        #restart-btn {
            background: linear-gradient(45deg, #00ffff, #ff00ff);
            color: white;
            border: none;
            padding: 18px 50px;
            font-size: 22px;
            cursor: pointer;
            border-radius: 50px;
            margin-top: 40px;
            pointer-events: auto;
            font-family: inherit;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: all 0.3s;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.5), 0 0 60px rgba(255, 0, 255, 0.3);
        }

        #restart-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.8), 0 0 100px rgba(255, 0, 255, 0.5);
        }

        #start-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 1000;
            background: radial-gradient(circle at center, #1a1a3a 0%, #0a0a1a 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #start-screen h1 {
            font-size: 52px;
            color: #00ffff;
            text-shadow: 0 0 30px #00ffff, 0 0 60px #ff00ff;
            margin-bottom: 20px;
            letter-spacing: 6px;
        }

        #start-screen p {
            font-size: 20px;
            color: #aaa;
            margin-bottom: 40px;
        }

        #start-btn {
            background: linear-gradient(45deg, #ff00ff, #00ffff);
            color: white;
            border: none;
            padding: 20px 60px;
            font-size: 24px;
            cursor: pointer;
            border-radius: 50px;
            font-family: inherit;
            text-transform: uppercase;
            letter-spacing: 4px;
            transition: all 0.3s;
            box-shadow: 0 0 40px rgba(255, 0, 255, 0.5);
            animation: btn-glow 2s ease-in-out infinite;
        }

        @keyframes btn-glow {

            0%,
            100% {
                box-shadow: 0 0 40px rgba(255, 0, 255, 0.5);
            }

            50% {
                box-shadow: 0 0 60px rgba(0, 255, 255, 0.8), 0 0 80px rgba(0, 255, 255, 0.4);
            }
        }

        #start-btn:hover {
            transform: scale(1.1);
        }

        /* Win animation overlay */
        #win-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 1001;
            background: radial-gradient(circle, rgba(0, 255, 136, 0.3) 0%, transparent 70%);
            animation: win-pulse 0.5s ease-out;
        }

        @keyframes win-pulse {
            0% {
                transform: scale(0);
                opacity: 0;
            }

            50% {
                transform: scale(1.2);
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div id="start-screen">
        <h1>NEON SEQUENCE</h1>
        <p>Watch the pattern, then repeat it!</p>
        <button id="start-btn" onclick="startGame()">START GAME</button>
    </div>

    <div id="game-ui">
        <h1 id="title">NEON SEQUENCE</h1>
        <p id="level">Level: 1</p>
        <p id="score">Score: 0</p>
        <p id="message"></p>
    </div>

    <div id="instructions">Click the glowing orbs in the correct sequence!</div>

    <div id="game-over">
        <h1>GAME OVER</h1>
        <p>Level Reached: <span id="final-level">1</span></p>
        <p>Final Score: <span id="final-score">0</span></p>
        <button id="restart-btn" onclick="restartGame()">Play Again</button>
    </div>

    <div id="win-overlay"></div>

    <!-- Neon Grid Floor -->
    <a-scene background="color: #050510" vr-mode-ui="enabled: false">
        <!-- Assets -->
        <a-assets>
            <a-mixin id="orb-base" geometry="primitive: sphere; radius: 0.5"
                material="color: #444444; emissiveIntensity: 0.8; metalness: 0.3; roughness: 0.5">
            </a-mixin>
            <a-mixin id="orb-ring" geometry="primitive: torus; radius: 0.6; radiusTubular: 0.02"
                material="color: #00ffff; emissive: #00ffff; emissiveIntensity: 0.5">
            </a-mixin>

            <!-- Camera -->
            <a-entity id="camera-rig" position="0 2 6">
                <a-camera id="camera" look-controls="enabled: false" wasd-controls="enabled: false">
                    <a-cursor color="#ffffff" fuse="false"></a-cursor>
                </a-camera>
            </a-entity>

            <!-- Ambient Light - Brighter for visibility -->
            <a-light type="ambient" color="#666688" intensity="0.8"></a-light>

            <!-- Point Lights - Brighter -->
            <a-light type="point" color="#ff00ff" intensity="2" position="-3 3 2" distance="15"
                animation="property: intensity; from: 1 to: 2.5; dur: 2000; dir: alternate; loop: true">
            </a-light>
            <a-light type="point" color="#00ffff" intensity="2" position="3 3 2" distance="15"
                animation="property: intensity; from: 2.5 to: 1; dur: 2000; dir: alternate; loop: true">
            </a-light>
            <a-light type="point" color="#ffffff" intensity="1" position="0 5 5" distance="20"></a-light>

            <!-- Game Title in 3D -->
            <a-text id="title-3d" value="NEON SEQUENCE" position="0 4 -4" color="#00ffff" align="center" width="15"
                animation="property: color; from: #00ffff; to: #ff00ff; dur: 2000; dir: alternate; loop: true">
            </a-text>

            <!-- Level Display in 3D -->
            <a-text id="level-3d" value="LEVEL 1" position="0 3.3 -4" color="#00ff88" align="center" width="8">
            </a-text>

            <!-- Sequence Status Text - More visible -->
            <a-text id="sequence-status" value="WATCH THE SEQUENCE" position="0 4.5 -4" color="#ffff00" align="center" width="12"
                opacity="0">
            </a-text>

            <!-- Score Display in 3D -->
            <a-text id="score-3d" value="0" position="0 2.8 -4" color="#ff00ff" align="center" width="6">
            </a-text>

            <!-- Game Orbs Container -->
            <a-entity id="orbs-container" position="0 1.5 -2">
                <!-- Orb 1 - Red -->
                <a-entity id="orb-1" class="game-orb" position="-2.5 0 0" data-index="0" 
                    geometry="primitive: sphere; radius: 0.5"
                    material="color: #ff3366; emissive: #ff3366; emissiveIntensity: 0.8" clickable-orbs>
                    <a-entity geometry="primitive: torus; radius: 0.6; radiusTubular: 0.02"
                        material="color: #00ffff; emissive: #00ffff; emissiveIntensity: 1"
                        animation="property: rotation; to: 0 360 0; dur: 3000; loop: true; easing: linear">
                    </a-entity>
                </a-entity>

                <!-- Orb 2 - Cyan -->
                <a-entity id="orb-2" class="game-orb" position="-0.83 0 0" data-index="1" 
                    geometry="primitive: sphere; radius: 0.5"
                    material="color: #00ffff; emissive: #00ffff; emissiveIntensity: 0.8" clickable-orbs>
                    <a-entity geometry="primitive: torus; radius: 0.6; radiusTubular: 0.02"
                        material="color: #ff00ff; emissive: #ff00ff; emissiveIntensity: 1"
                        animation="property: rotation; to: 0 -360 0; dur: 4000; loop: true; easing: linear">
                    </a-entity>
                </a-entity>

                <!-- Orb 3 - Green -->
                <a-entity id="orb-3" class="game-orb" position="0.83 0 0" data-index="2" 
                    geometry="primitive: sphere; radius: 0.5"
                    material="color: #00ff88; emissive: #00ff88; emissiveIntensity: 0.8" clickable-orbs>
                    <a-entity geometry="primitive: torus; radius: 0.6; radiusTubular: 0.02"
                        material="color: #ffff00; emissive: #ffff00; emissiveIntensity: 1"
                        animation="property: rotation; to: 360 0 0; dur: 3500; loop: true; easing: linear">
                    </a-entity>
                </a-entity>

                <!-- Orb 4 - Magenta -->
                <a-entity id="orb-4" class="game-orb" position="2.5 0 0" data-index="3" 
                    geometry="primitive: sphere; radius: 0.5"
                    material="color: #ff00ff; emissive: #ff00ff; emissiveIntensity: 0.8" clickable-orbs>
                    <a-entity geometry="primitive: torus; radius: 0.6; radiusTubular: 0.02"
                        material="color: #00ffff; emissive: #00ffff; emissiveIntensity: 1"
                        animation="property: rotation; to: 0 360 360; dur: 2500; loop: true; easing: linear">
                    </a-entity>
                </a-entity>
            </a-entity>

            <!-- Feedback Text -->
            <a-text id="feedback" value="" position="0 0.5 -2" color="white" align="center" width="10" opacity="0">
            </a-text>

            <!-- Neon Grid Floor -->
            <a-entity id="floor" position="0 -0.5 0">
                <a-plane rotation="-90 0 0" width="20" height="10" material="color: #0a0a1a; opacity: 0.9" grid-floor>
                </a-plane>

                <!-- Grid lines -->
                <a-entity id="grid-lines">
                    <a-box position="0 -0.48 -2" width="20" height="0.02" depth="0.02" color="#00ffff"
                        opacity="0.5"></a-box>
                    <a-box position="0 -0.48 0" width="20" height="0.02" depth="0.02" color="#00ffff"
                        opacity="0.5"></a-box>
                    <a-box position="0 -0.48 2" width="20" height="0.02" depth="0.02" color="#00ffff"
                        opacity="0.5"></a-box>
                    <a-box position="-8 -0.48 0" width="0.02" height="0.02" depth="6" color="#ff00ff"
                        opacity="0.5"></a-box>
                    <a-box position="-4 -0.48 0" width="0.02" height="0.02" depth="6" color="#ff00ff"
                        opacity="0.5"></a-box>
                    <a-box position="0 -0.48 0" width="0.02" height="0.02" depth="6" color="#ff00ff"
                        opacity="0.5"></a-box>
                    <a-box position="4 -0.48 0" width="0.02" height="0.02" depth="6" color="#ff00ff"
                        opacity="0.5"></a-box>
                    <a-box position="8 -0.48 0" width="0.02" height="0.02" depth="6" color="#ff00ff"
                        opacity="0.5"></a-box>
                </a-entity>
            </a-entity>

            <!-- Background Particles -->
            <a-entity id="particles">
                <a-sphere position="-5 4 -8" radius="0.1" color="#00ffff" opacity="0.6"
                    animation="property: position; to: -5 4.5 -8; dur: 1500; dir: alternate; loop: true">
                </a-sphere>
                <a-sphere position="5 3 -10" radius="0.15" color="#ff00ff" opacity="0.5"
                    animation="property: position; to: 5 3.5 -10; dur: 2000; dir: alternate; loop: true">
                </a-sphere>
                <a-sphere position="-3 5 -12" radius="0.08" color="#00ff88" opacity="0.4"
                    animation="property: position; to: -3 5.3 -12; dur: 1800; dir: alternate; loop: true">
                </a-sphere>
                <a-sphere position="4 6 -9" radius="0.12" color="#ffff00" opacity="0.5"
                    animation="property: position; to: 4 6.4 -9; dur: 2200; dir: alternate; loop: true">
                </a-sphere>
                <a-sphere position="0 7 -11" radius="0.1" color="#ff6600" opacity="0.4"
                    animation="property: position; to: 0 7.3 -11; dur: 1900; dir: alternate; loop: true">
                </a-sphere>
            </a-entity>

            <!-- Sky -->
            <a-sky color="#050510"></a-sky>
    </a-scene>

    <!-- Inspector config - must be before inspector script -->
    <script>
        window.AFRAME_INSPECTOR_CONFIG = {
            exampleMode: true
        };
    </script>
    <script src="../dist/aframe-inspector.js"></script>

    <script>
        // Game State
        window.gameState = {
            sequence: [],
            playerSequence: [],
            level: 1,
            score: 0,
            isPlaying: false,
            isShowingSequence: false,
            canClick: false,
            orbs: ['#orb-1', '#orb-2', '#orb-3', '#orb-4'],
            orbColors: ['#ff3366', '#00ffff', '#00ff88', '#ff00ff'],
            orbGlowColors: ['#ff6699', '#66ffff', '#66ffaa', '#ff66ff']
        };

        // Orb Click Component
        AFRAME.registerComponent('clickable-orbs', {
            init: function () {
                const el = this.el;
                const index = parseInt(el.getAttribute('data-index'));

                el.addEventListener('click', () => {
                    if (!window.gameState.canClick || window.gameState.isShowingSequence) return;

                    // Light up the orb
                    this.lightUpOrb(el, index);

                    // Add to player sequence
                    window.gameState.playerSequence.push(index);

                    // Check the sequence
                    this.checkSequence();
                });

                // Hover effects using behaviors
                el.addEventListener('mouseenter', () => {
                    if (typeof behaviorsManager !== 'undefined') {
                        behaviorsManager.applyBehavior(el, 'anime-scale', {
                            event: 'mouseenter',
                            target: '',
                            scaleX: 1.2,
                            scaleY: 1.2,
                            scaleZ: 1.2,
                            duration: 150,
                            easing: 'easeOutQuad',
                            direction: 'normal',
                            loop: 0
                        });
                    }
                });

                el.addEventListener('mouseleave', () => {
                    if (typeof behaviorsManager !== 'undefined') {
                        behaviorsManager.applyBehavior(el, 'anime-scale', {
                            event: 'mouseleave',
                            target: '',
                            scaleX: 1,
                            scaleY: 1,
                            scaleZ: 1,
                            duration: 150,
                            easing: 'easeOutQuad',
                            direction: 'normal',
                            loop: 0
                        });
                    }
                });
            },

            lightUpOrb: function (el, index) {
                const originalColor = window.gameState.orbColors[index];
                const glowColor = window.gameState.orbGlowColors[index];

                // Light up using behavior
                if (typeof behaviorsManager !== 'undefined') {
                    // Set to bright color
                    el.setAttribute('material', 'emissive', glowColor);
                    el.setAttribute('material', 'emissiveIntensity', 2);
                    el.setAttribute('material', 'color', '#ffffff');

                    // Scale up
                    behaviorsManager.applyBehavior(el, 'anime-scale', {
                        event: 'click',
                        target: '',
                        scaleX: 1.5,
                        scaleY: 1.5,
                        scaleZ: 1.5,
                        duration: 150,
                        easing: 'easeOutQuad',
                        direction: 'alternate',
                        loop: 1
                    });

                    // Rotate animation
                    behaviorsManager.applyBehavior(el, 'anime-rotate', {
                        event: 'click',
                        target: '',
                        axis: 'xyz',
                        angle: 180,
                        duration: 300,
                        easing: 'easeOutCubic',
                        loop: 0
                    });

                    // Play sound
                    this.playTone(index);

                    // Reset after delay
                    setTimeout(() => {
                        el.setAttribute('material', 'emissive', originalColor);
                        el.setAttribute('material', 'emissiveIntensity', 0.5);
                        el.setAttribute('material', 'color', originalColor);
                    }, 350);
                } else {
                    // Fallback without behaviors
                    el.setAttribute('material', 'emissive', glowColor);
                    el.setAttribute('material', 'emissiveIntensity', 2);
                    el.setAttribute('material', 'color', '#ffffff');

                    setTimeout(() => {
                        el.setAttribute('material', 'emissive', originalColor);
                        el.setAttribute('material', 'emissiveIntensity', 0.5);
                        el.setAttribute('material', 'color', originalColor);
                    }, 350);
                }
            },

            playTone: function (index) {
                try {
                    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    const oscillator = audioCtx.createOscillator();
                    const gainNode = audioCtx.createGain();

                    oscillator.connect(gainNode);
                    gainNode.connect(audioCtx.destination);

                    // Different frequencies for each orb
                    const frequencies = [261.63, 329.63, 392.00, 523.25]; // C4, E4, G4, C5
                    oscillator.frequency.value = frequencies[index];
                    oscillator.type = 'sine';

                    gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);

                    oscillator.start(audioCtx.currentTime);
                    oscillator.stop(audioCtx.currentTime + 0.3);
                } catch (e) {
                    console.log('Audio not available');
                }
            },

            checkSequence: function () {
                const playerSeq = window.gameState.playerSequence;
                const gameSeq = window.gameState.sequence;
                const currentIndex = playerSeq.length - 1;

                // Check if current input matches
                if (playerSeq[currentIndex] !== gameSeq[currentIndex]) {
                    this.wrongAnswer();
                    return;
                }

                // Check if sequence is complete
                if (playerSeq.length === gameSeq.length) {
                    this.sequenceComplete();
                }
            },

            wrongAnswer: function () {
                window.gameState.canClick = false;

                // Show feedback
                const feedback = document.querySelector('#feedback');
                feedback.setAttribute('value', 'WRONG!');
                feedback.setAttribute('color', '#ff3366');
                feedback.setAttribute('opacity', '1');

                // Shake all orbs
                window.gameState.orbs.forEach(orbId => {
                    const orb = document.querySelector(orbId);
                    if (typeof behaviorsManager !== 'undefined') {
                        behaviorsManager.applyBehavior(orb, 'anime-shake', {
                            event: 'wrong',
                            target: '',
                            intensity: 'strong',
                            loop: 2
                        });
                    }
                });

                // Using condition behavior to check score
                if (typeof behaviorsManager !== 'undefined') {
                    const orbsContainer = document.querySelector('#orbs-container');
                    behaviorsManager.applyBehavior(orbsContainer, 'condition', {
                        event: 'wrong',
                        variable: 'level',
                        operator: '>=',
                        value: '5',
                        onTrue: 'master-player',
                        onFalse: 'keep-practicing'
                    });
                }

                setTimeout(() => {
                    feedback.setAttribute('opacity', '0');
                    gameOver();
                }, 1000);
            },

            sequenceComplete: function () {
                window.gameState.canClick = false;

                // Update score
                window.gameState.score += window.gameState.level * 10;
                document.getElementById('score').textContent = 'Score: ' + window.gameState.score;
                document.querySelector('#score-3d').setAttribute('value', window.gameState.score.toString());

                // Show feedback
                const feedback = document.querySelector('#feedback');
                feedback.setAttribute('value', 'CORRECT!');
                feedback.setAttribute('color', '#00ff88');
                feedback.setAttribute('opacity', '1');

                // Celebration animation
                window.gameState.orbs.forEach((orbId, i) => {
                    const orb = document.querySelector(orbId);
                    setTimeout(() => {
                        if (typeof behaviorsManager !== 'undefined') {
                            behaviorsManager.applyBehavior(orb, 'anime-pulse', {
                                event: 'celebrate',
                                target: '',
                                scale: 1.4,
                                duration: 300,
                                easing: 'easeOutElastic',
                                direction: 'alternate',
                                loop: 2
                            });
                        }
                    }, i * 100);
                });

                // Show win overlay
                setTimeout(() => {
                    document.getElementById('win-overlay').style.display = 'block';
                    setTimeout(() => {
                        document.getElementById('win-overlay').style.display = 'none';
                    }, 500);
                }, 300);

                // Update level
                window.gameState.level++;
                document.getElementById('level').textContent = 'Level: ' + window.gameState.level;
                document.querySelector('#level-3d').setAttribute('value', 'LEVEL ' + window.gameState.level);

                // Using change-variable behavior
                if (typeof behaviorsManager !== 'undefined') {
                    const levelDisplay = document.querySelector('#level-3d');
                    behaviorsManager.applyBehavior(levelDisplay, 'change-variable', {
                        event: 'level-up',
                        variableName: 'level',
                        amount: 1,
                        operation: 'add'
                    });
                }

                setTimeout(() => {
                    feedback.setAttribute('opacity', '0');
                    // Add to sequence
                    this.addToSequence();
                }, 1500);
            }
        });

        // Grid Floor Animation Component
        AFRAME.registerComponent('grid-floor', {
            init: function () {
                if (typeof behaviorsManager !== 'undefined') {
                    // Pulse the grid lines
                    const gridLines = document.querySelectorAll('#grid-lines a-box');
                    gridLines.forEach((line, i) => {
                        behaviorsManager.applyBehavior(line, 'anime-pulse', {
                            event: 'loaded',
                            target: '',
                            scale: 1.1,
                            duration: 1500 + (i * 100),
                            easing: 'easeInOutSine',
                            direction: 'alternate',
                            loop: 0
                        });
                    });
                }
            }
        });

        // Initialize game
        window.startGame = function () {
            document.getElementById('start-screen').style.display = 'none';

            // Initialize behaviors on scene load
            const scene = document.querySelector('a-scene');
            if (scene.hasLoaded) {
                initGameBehaviors();
            } else {
                scene.addEventListener('loaded', initGameBehaviors);
            }

            resetGame();
            showSequence();
        };

        window.initGameBehaviors = function () {
            if (typeof behaviorsManager !== 'undefined') {
                const title3d = document.querySelector('#title-3d');
                if (title3d) {
                    behaviorsManager.applyBehavior(title3d, 'anime-pulse', {
                        event: 'loaded',
                        target: '',
                        scale: 1.05,
                        duration: 1500,
                        easing: 'easeInOutSine',
                        direction: 'alternate',
                        loop: 0
                    });
                }

                const level3d = document.querySelector('#level-3d');
                if (level3d) {
                    behaviorsManager.applyBehavior(level3d, 'trigger-event', {
                        event: 'loaded',
                        customEvent: 'level-ready'
                    });
                }

                console.log('Neon Sequence loaded with BehaviorsManager!');
            }
        };

        window.resetGame = function () {
            window.gameState.sequence = [];
            window.gameState.playerSequence = [];
            window.gameState.level = 1;
            window.gameState.score = 0;
            window.gameState.isPlaying = true;

            document.getElementById('level').textContent = 'Level: 1';
            document.getElementById('score').textContent = 'Score: 0';
            var level3d = document.querySelector('#level-3d');
            if (level3d) level3d.setAttribute('value', 'LEVEL 1');
            var score3d = document.querySelector('#score-3d');
            if (score3d) score3d.setAttribute('value', '0');
        };

        function showSequence() {
            window.gameState.isShowingSequence = true;
            window.gameState.canClick = false;

            // Show message
            showMessage('Watch the sequence...');

            setTimeout(() => {
                // Add new step to sequence
                addToSequence();
            }, 1000);
        }

        function addToSequence() {
            const randomOrb = Math.floor(Math.random() * 4);
            window.gameState.sequence.push(randomOrb);
            window.gameState.playerSequence = [];

            // Play the sequence
            playSequence();
        }

        function playSequence() {
            // Show "Watch the sequence" text
            const statusText = document.querySelector('#sequence-status');
            if (statusText) {
                statusText.setAttribute('value', 'WATCH THE SEQUENCE');
                statusText.setAttribute('color', '#ffff00');
                statusText.setAttribute('opacity', '1');
            }

            let i = 0;
            const interval = setInterval(() => {
                if (i >= window.gameState.sequence.length) {
                    clearInterval(interval);
                    window.gameState.isShowingSequence = false;
                    window.gameState.canClick = true;
                    
                    // Update status text
                    if (statusText) {
                        statusText.setAttribute('value', 'YOUR TURN!');
                        statusText.setAttribute('color', '#00ff88');
                        setTimeout(() => {
                            statusText.setAttribute('opacity', '0');
                        }, 1000);
                    }
                    
                    showMessage('Your turn!');
                    return;
                }

                const orbIndex = window.gameState.sequence[i];
                const orb = document.querySelector(window.gameState.orbs[orbIndex]);
                const orbComponent = orb.components['clickable-orbs'];

                if (orbComponent) {
                    orbComponent.lightUpOrb(orb, orbIndex);
                }

                i++;
            }, 800);
        }

        function showMessage(text) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.classList.add('visible');

            if (typeof behaviorsManager !== 'undefined') {
                const feedback = document.querySelector('#feedback');
                behaviorsManager.applyBehavior(feedback, 'trigger-event', {
                    event: 'message-show',
                    customEvent: 'message-displayed'
                });
            }

            setTimeout(() => {
                msg.classList.remove('visible');
            }, 2000);
        }

        function gameOver() {
            window.gameState.isPlaying = false;

            document.getElementById('game-over').style.display = 'block';
            document.getElementById('final-level').textContent = window.gameState.level;
            document.getElementById('final-score').textContent = window.gameState.score;

            // Using game-save behavior
            if (typeof behaviorsManager !== 'undefined') {
                const orbsContainer = document.querySelector('#orbs-container');

                // Save score
                behaviorsManager.applyBehavior(orbsContainer, 'game-save', {
                    event: 'game-over',
                    key: 'neonSequenceScore',
                    variableName: 'score'
                });

                // Random event demo
                behaviorsManager.applyBehavior(orbsContainer, 'get-random', {
                    event: 'game-over',
                    min: 1,
                    max: 10,
                    variableName: 'luckyNumber'
                });
            }
        }

        window.restartGame = function () {
            document.getElementById('game-over').style.display = 'none';

            // Reset orbs to original state
            window.gameState.orbs.forEach((orbId, index) => {
                var orb = document.querySelector(orbId);
                if (orb) {
                    var originalColor = window.gameState.orbColors[index];
                    orb.setAttribute('material', 'emissive', originalColor);
                    orb.setAttribute('material', 'emissiveIntensity', 0.3);
                    orb.setAttribute('material', 'color', originalColor);
                }
            });

            window.resetGame();
            showSequence();
        };

        // Demo: Apply additional behaviors on load
        document.querySelector('a-scene').addEventListener('loaded', function () {
            console.log('Neon Sequence game ready!');

            // Demo behaviors for particles
            if (typeof behaviorsManager !== 'undefined') {
                const particles = document.querySelectorAll('#particles a-sphere');
                particles.forEach((particle, i) => {
                    // Random rotation
                    behaviorsManager.applyBehavior(particle, 'anime-rotate', {
                        event: 'loaded',
                        target: '',
                        axis: 'xyz',
                        angle: 360,
                        duration: 5000 + (i * 500),
                        easing: 'linear',
                        loop: 0
                    });
                });
            }
        });
    </script>
</body>

</html>
