<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>Quest of the Realm - 3D RPG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  <script>
    // Game State
    window.gameState = {
      health: 100,
      gold: 0,
      questItems: 0,
      totalQuestItems: 3,
      enemiesDefeated: 0,
      totalEnemies: 5,
      isPlaying: false,
      hasWeapon: false,
      questComplete: false
    };

    // Player Controller
    AFRAME.registerComponent('player-controller', {
      schema: {
        speed: { type: 'number', default: 0.3 }
      },
      init: function () {
        this.keys = {};

        window.addEventListener('keydown', (e) => {
          this.keys[e.key.toLowerCase()] = true;
        });

        window.addEventListener('keyup', (e) => {
          this.keys[e.key.toLowerCase()] = false;
        });
      },
      tick: function (time, delta) {
        if (!window.gameState.isPlaying) return;

        const el = this.el;
        const position = Object.assign({}, el.getAttribute('position'));
        const speed = this.data.speed;

        if (this.keys['a'] || this.keys['arrowleft']) {
          position.x = Math.max(position.x - speed, -20);
        }
        if (this.keys['d'] || this.keys['arrowright']) {
          position.x = Math.min(position.x + speed, 20);
        }
        if (this.keys['w'] || this.keys['arrowup']) {
          position.z -= speed;
        }
        if (this.keys['s'] || this.keys['arrowdown']) {
          position.z += speed;
        }

        // Keep player within bounds
        position.z = Math.max(Math.min(position.z, 5), -25);

        el.setAttribute('position', position);

        // Update player position for distance checks
        window.gameState.playerPosition = position;
      }
    });

    // Quest Item - collectible
    AFRAME.registerComponent('quest-item', {
      schema: {
        value: { type: 'number', default: 1 },
        itemId: { type: 'string', default: 'item' }
      },
      init: function () {
        const el = this.el;
        const itemId = this.data.itemId;

        // Floating animation
        el.setAttribute('animation', {
          property: 'position.y',
          to: el.object3D.position.y + 0.3,
          dur: 1000,
          dir: 'alternate',
          loop: true,
          easing: 'easeInOutSine'
        });

        // Rotation animation
        el.setAttribute('animation__rot', {
          property: 'rotation.y',
          to: 360,
          dur: 3000,
          loop: true,
          easing: 'linear'
        });

        // Click to collect
        el.addEventListener('click', function () {
          // Add item to quest
          window.gameState.questItems += 1;
          window.gameState.gold += 10;

          // Update UI
          updateQuestUI();

          // Visual feedback
          el.emit('collected');

          // Hide item
          setTimeout(() => {
            el.setAttribute('visible', false);
          }, 200);

          // Check quest progress
          checkQuestProgress();
        });

        // Hover effect
        el.addEventListener('mouseenter', function () {
          el.setAttribute('scale', '1.3 1.3 1.3');
        });

        el.addEventListener('mouseleave', function () {
          el.setAttribute('scale', '1 1 1');
        });
      }
    });

    // Enemy Component
    AFRAME.registerComponent('enemy', {
      schema: {
        health: { type: 'number', default: 30 },
        damage: { type: 'number', default: 10 }
      },
      init: function () {
        const el = this.el;
        const health = this.data.health;

        // Patrol animation
        const startX = el.object3D.position.x;
        el.setAttribute('animation__patrol', {
          property: 'position.x',
          from: startX - 2,
          to: startX + 2,
          dur: 2000,
          dir: 'alternate',
          loop: true,
          easing: 'easeInOutSine'
        });

        // Attack on click (player attacks enemy)
        el.addEventListener('click', function () {
          if (!window.gameState.hasWeapon) {
            showMessage("You need a weapon! Find the sword.");
            return;
          }

          // Damage enemy
          const newHealth = health - 25;

          if (newHealth <= 0) {
            // Enemy defeated
            window.gameState.enemiesDefeated += 1;
            updateQuestUI();

            // Visual death effect
            el.setAttribute('animation__death', {
              property: 'scale',
              to: '0 0 0',
              dur: 500,
              easing: 'easeInBack'
            });

            setTimeout(() => {
              el.setAttribute('visible', false);
            }, 500);

            checkQuestProgress();
          } else {
            // Enemy hurt animation
            el.setAttribute('material', 'color', '#FF0000');
            setTimeout(() => {
              el.setAttribute('material', 'color', '#8B0000');
            }, 200);

            // Update health display
            const healthText = el.querySelector('a-text');
            if (healthText) {
              healthText.setAttribute('value', 'Health: ' + newHealth);
            }
          }
        });

        // Player proximity detection (enemy attacks player)
        el.setAttribute('animation__chase', {
          property: 'position',
          dur: 100,
          loop: true
        });

        // Hover effect
        el.addEventListener('mouseenter', function () {
          el.setAttribute('scale', '1.2 1.2 1.2');
        });

        el.addEventListener('mouseleave', function () {
          el.setAttribute('scale', '1 1 1');
        });
      }
    });

    // Weapon pickup
    AFRAME.registerComponent('weapon-pickup', {
      init: function () {
        const el = this.el;

        // Floating animation
        el.setAttribute('animation', {
          property: 'rotation.y',
          to: 360,
          dur: 2000,
          loop: true,
          easing: 'linear'
        });

        el.setAttribute('animation__float', {
          property: 'position.y',
          to: el.object3D.position.y + 0.2,
          dur: 800,
          dir: 'alternate',
          loop: true,
          easing: 'easeInOutSine'
        });

        // Click to pick up weapon
        el.addEventListener('click', function () {
          window.gameState.hasWeapon = true;

          // Update UI
          const weaponStatus = document.querySelector('#weaponStatus');
          if (weaponStatus) {
            weaponStatus.setAttribute('text', 'value', 'Weapon: Sword (Click enemies to attack!)');
            weaponStatus.setAttribute('text', 'color', '#00FF00');
          }

          // Visual feedback
          el.emit('pickup');

          // Hide weapon
          setTimeout(() => {
            el.setAttribute('visible', false);
          }, 300);

          showMessage("You got the sword! Now you can defeat enemies!");
        });

        // Hover effect
        el.addEventListener('mouseenter', function () {
          el.setAttribute('scale', '1.4 1.4 1.4');
        });

        el.addEventListener('mouseleave', function () {
          el.setAttribute('scale', '1 1 1');
        });
      }
    });

    // Spawn Point
    AFRAME.registerComponent('spawn-point', {
      init: function () {
        const el = this.el;

        // Glowing effect
        el.setAttribute('animation__glow', {
          property: 'material.opacity',
          from: 0.5,
          to: 1,
          dur: 1000,
          dir: 'alternate',
          loop: true,
          easing: 'easeInOutSine'
        });

        // Click to set spawn
        el.addEventListener('click', function () {
          showMessage("This is the spawn point. You respawn here if defeated.");
        });
      }
    });

    // Finish Point / Quest Goal
    AFRAME.registerComponent('finish-point', {
      init: function () {
        const el = this.el;

        // Rotating animation
        el.setAttribute('animation', {
          property: 'rotation.y',
          to: 360,
          dur: 4000,
          loop: true,
          easing: 'linear'
        });

        el.setAttribute('animation__pulse', {
          property: 'scale',
          from: '1 1 1',
          to: '1.2 1.2 1.2',
          dur: 1500,
          dir: 'alternate',
          loop: true,
          easing: 'easeInOutSine'
        });

        // Click to complete quest
        el.addEventListener('click', function () {
          if (window.gameState.questComplete) {
            showMessage("Quest already completed! Return to the village.");
            return;
          }

          if (window.gameState.questItems < window.gameState.totalQuestItems) {
            showMessage("You need more quest items! Collect all " + window.gameState.totalQuestItems + " crystals.");
            return;
          }

          if (window.gameState.enemiesDefeated < window.gameState.totalEnemies) {
            showMessage("You need to defeat more enemies! " + window.gameState.totalEnemies + " enemies to defeat.");
            return;
          }

          // Quest complete!
          window.gameState.questComplete = true;
          window.gameState.gold += 100;

          // Show victory
          showVictoryScreen();
        });
      }
    });

    // NPC Component for quest-giving
    AFRAME.registerComponent('npc', {
      schema: {
        name: { type: 'string', default: 'Villager' },
        dialogue: { type: 'string', default: 'Hello, adventurer!' }
      },
      init: function () {
        const el = this.el;
        const name = this.data.name;
        const dialogue = this.data.dialogue;

        // Idle animation
        el.setAttribute('animation__bob', {
          property: 'position.y',
          to: el.object3D.position.y + 0.1,
          dur: 1500,
          dir: 'alternate',
          loop: true,
          easing: 'easeInOutSine'
        });

        // Click to talk
        el.addEventListener('click', function () {
          showMessage(dialogue);

          // If it's the quest giver, update quest status
          if (name === 'Quest Giver') {
            updateQuestUI();
          }
        });

        // Look at player
        el.setAttribute('look-at', '#player');
      }
    });

    // Update Quest UI
    function updateQuestUI() {
      const questStatus = document.querySelector('#questStatus');
      if (questStatus) {
        let status = 'Items: ' + window.gameState.questItems + '/' + window.gameState.totalQuestItems +
          ' | Enemies: ' + window.gameState.enemiesDefeated + '/' + window.gameState.totalEnemies +
          ' | Gold: ' + window.gameState.gold;
        questStatus.setAttribute('text', 'value', status);
      }
    }

    // Check Quest Progress
    function checkQuestProgress() {
      if (window.gameState.questItems >= window.gameState.totalQuestItems &&
        window.gameState.enemiesDefeated >= window.gameState.totalEnemies) {

        const questComplete = document.querySelector('#questComplete');
        if (questComplete) {
          questComplete.setAttribute('text', 'value', 'QUEST COMPLETE! Go to the portal!');
          questComplete.setAttribute('text', 'color', '#00FF00');
        }
      }
    }

    // Show Message
    function showMessage(msg) {
      const messageBox = document.querySelector('#messageBox');
      if (messageBox) {
        messageBox.setAttribute('text', 'value', msg);
        messageBox.setAttribute('visible', true);

        // Hide after 3 seconds
        setTimeout(() => {
          messageBox.setAttribute('visible', false);
        }, 3000);
      }
    }

    // Show Victory Screen
    function showVictoryScreen() {
      const victoryScreen = document.querySelector('#victoryScreen');
      if (victoryScreen) {
        victoryScreen.setAttribute('visible', true);
      }

      const finalScore = document.querySelector('#finalScore');
      if (finalScore) {
        finalScore.setAttribute('text', 'value', 'Final Score: ' + window.gameState.gold + ' Gold!');
      }
    }

    // Start Game
    AFRAME.registerComponent('start-quest', {
      init: function () {
        const el = this.el;

        el.addEventListener('click', function () {
          // Hide start screen
          const startScreen = document.querySelector('#startScreen');
          if (startScreen) {
            startScreen.setAttribute('visible', false);
          }

          // Initialize game
          window.gameState.isPlaying = true;
          window.gameState.health = 100;
          window.gameState.gold = 0;
          window.gameState.questItems = 0;
          window.gameState.enemiesDefeated = 0;

          // Show quest items and enemies
          document.querySelectorAll('.quest-item').forEach(function (item) {
            item.setAttribute('visible', true);
            item.setAttribute('scale', '1 1 1');
          });

          document.querySelectorAll('.enemy').forEach(function (enemy) {
            enemy.setAttribute('visible', true);
            enemy.setAttribute('scale', '1 1 1');
          });

          // Update UI
          updateQuestUI();
        });
      }
    });
  </script>
</head>

<body>
  <a-scene background="color: #1a1a2e">
    <!-- Assets -->
    <a-assets>
      <a-mixin id="tree" geometry="primitive: cone; radiusBottom: 1; height: 4; segmentsRadial: 8"
        material="color: #228B22" position="0 2 0"></a-mixin>
    </a-assets>

    <!-- Sky -->
    <a-sky color="#2d1b4e"></a-sky>

    <!-- Ground -->
    <a-plane position="0 0 -10" rotation="-90 0 0" width="50" height="50"
      material="color: #3d5c3d; metalness: 0.1; roughness: 0.9"></a-plane>

    <!-- Path -->
    <a-plane position="0 0.01 -10" rotation="-90 0 0" width="4" height="40"
      material="color: #8B4513; roughness: 1"></a-plane>

    <!-- ==================== ENVIRONMENT ==================== -->

    <!-- Trees -->
    <a-entity mixin="tree" position="-8 0 -5"></a-entity>
    <a-entity mixin="tree" position="-10 0 -10"></a-entity>
    <a-entity mixin="tree" position="8 0 -8"></a-entity>
    <a-entity mixin="tree" position="10 0 -15"></a-entity>
    <a-entity mixin="tree" position="-6 0 -20"></a-entity>
    <a-entity mixin="tree" position="7 0 -22"></a-entity>

    <!-- Rocks -->
    <a-dodecahedron position="-5 0.5 -12" radius="0.8" color="#555"></a-dodecahedron>
    <a-dodecahedron position="6 0.5 -18" radius="1" color="#444"></a-dodecahedron>
    <a-dodecahedron position="-3 0.3 -25" radius="0.6" color="#666"></a-dodecahedron>

    <!-- Village Buildings -->
    <!-- House 1 -->
    <a-box position="-6 1 -2" width="3" height="2" depth="3" color="#8B4513"></a-box>
    <a-cone position="-6 2.5 -2" radiusBottom="2" height="1.5" color="#654321"></a-cone>
    <a-box position="-6 0.5 -0.4" width="1" height="1" depth="0.2" color="#333"></a-box>

    <!-- House 2 -->
    <a-box position="6 1 -3" width="2.5" height="1.8" depth="2.5" color="#A0522D"></a-box>
    <a-cone position="6 2.4 -3" radiusBottom="1.8" height="1.2" color="#8B4513"></a-cone>

    <!-- ==================== QUEST OBJECTS ==================== -->

    <!-- Quest Crystals (Collectibles) -->
    <a-octahedron class="quest-item" quest-item="itemId: crystal1" position="-3 1 -8" radius="0.4"
      material="color: #00FFFF; emissive: #00FFFF; emissiveIntensity: 0.5" visible="true"></a-octahedron>

    <a-octahedron class="quest-item" quest-item="itemId: crystal2" position="4 1.5 -15" radius="0.4"
      material="color: #FF00FF; emissive: #FF00FF; emissiveIntensity: 0.5" visible="true"></a-octahedron>

    <a-octahedron class="quest-item" quest-item="itemId: crystal3" position="-2 2 -22" radius="0.4"
      material="color: #FFFF00; emissive: #FFFF00; emissiveIntensity: 0.5" visible="true"></a-octahedron>

    <!-- Weapon Pickup (Sword) -->
    <a-entity id="sword" weapon-pickup position="3 0.8 -5">
      <a-box width="0.1" height="0.6" depth="0.02" color="#C0C0C0"></a-box>
      <a-box width="0.2" height="0.1" depth="0.05" color="#8B4513" position="0 -0.3 0"></a-box>
    </a-entity>

    <!-- ==================== ENEMIES ==================== -->

    <!-- Enemy 1 -->
    <a-entity class="enemy" enemy="health: 30; damage: 10" position="-2 1 -10">
      <a-box width="0.8" height="1.2" depth="0.8" color="#8B0000"></a-box>
      <a-sphere position="0 0.8 0" radius="0.3" color="#FF0000"></a-sphere>
      <a-text value="Goblin\nHealth: 30" position="0 1.5 0" align="center" color="#FFF" width="3"></a-text>
    </a-entity>

    <!-- Enemy 2 -->
    <a-entity class="enemy" enemy="health: 30; damage: 10" position="2 1 -14">
      <a-box width="0.8" height="1.2" depth="0.8" color="#8B0000"></a-box>
      <a-sphere position="0 0.8 0" radius="0.3" color="#FF0000"></a-sphere>
      <a-text value="Orc\nHealth: 30" position="0 1.5 0" align="center" color="#FFF" width="3"></a-text>
    </a-entity>

    <!-- Enemy 3 -->
    <a-entity class="enemy" enemy="health: 30; damage: 10" position="-1 1 -18">
      <a-box width="0.8" height="1.2" depth="0.8" color="#8B0000"></a-box>
      <a-sphere position="0 0.8 0" radius="0.3" color="#FF0000"></a-sphere>
      <a-text value="Orc\nHealth: 30" position="0 1.5 0" align="center" color="#FFF" width="3"></a-text>
    </a-entity>

    <!-- Enemy 4 -->
    <a-entity class="enemy" enemy="health: 30; damage: 10" position="3 1 -20">
      <a-box width="0.8" height="1.2" depth="0.8" color="#8B0000"></a-box>
      <a-sphere position="0 0.8 0" radius="0.3" color="#FF0000"></a-sphere>
      <a-text value="Goblin\nHealth: 30" position="0 1.5 0" align="center" color="#FFF" width="3"></a-text>
    </a-entity>

    <!-- Enemy 5 -->
    <a-entity class="enemy" enemy="health: 30; damage: 10" position="0 1 -24">
      <a-box width="0.8" height="1.2" depth="0.8" color="#8B0000"></a-box>
      <a-sphere position="0 0.8 0" radius="0.3" color="#FF0000"></a-sphere>
      <a-text value="Troll\nHealth: 30" position="0 1.5 0" align="center" color="#FFF" width="3"></a-text>
    </a-entity>

    <!-- ==================== NPCs ==================== -->

    <!-- Quest Giver NPC -->
    <a-entity id="questGiver"
      npc="name: Quest Giver; dialogue: Please help us! Defeat 5 enemies and collect 3 crystals to unlock the portal!"
      position="-3 0 -3">
      <a-cylinder radius="0.4" height="1.5" color="#4169E1"></a-cylinder>
      <a-sphere position="0 1 0" radius="0.35" color="#FFDAB9"></a-sphere>
      <a-text value="Quest Giver" position="0 1.6 0" align="center" color="#FFF" width="3"></a-text>
    </a-entity>

    <!-- ==================== LOCATIONS ==================== -->

    <!-- Spawn Point -->
    <a-cylinder id="spawnPoint" spawn-point position="0 0.1 -2" radius="1.5" height="0.2"
      material="color: #00FF00; emissive: #00FF00; emissiveIntensity: 0.3; opacity: 0.7" segments-radial="16">
      <a-text value="SPAWN" position="0 0.5 0" align="center" color="#00FF00" width="4" rotation="-90 0 0"></a-text>
    </a-cylinder>

    <!-- Finish Point / Portal -->
    <a-entity id="finishPoint" finish-point position="0 1.5 -28">
      <a-torus radius="1.5" radius-tubular="0.2" color="#9400D3"
        material="emissive: #9400D3; emissiveIntensity: 0.5"></a-torus>
      <a-circle radius="1.3" color="#4B0082" position="0 0 0" rotation="0 90 0"></a-circle>
      <a-text value="PORTAL" position="0 2 0" align="center" color="#9400D3" width="5"></a-text>
      <a-text value="Complete Quest" position="0 -2 0" align="center" color="#FFF" width="3"></a-text>
    </a-entity>

    <!-- ==================== UI ==================== -->

    <!-- Title -->
    <a-entity position="0 5 -5">
      <a-text value="QUEST OF THE REALM" align="center" color="#FFD700" width="10"></a-text>
    </a-entity>

    <!-- Quest Status -->
    <a-entity id="questStatus" position="0 4.2 -5"
      text="value: Items: 0/3 | Enemies: 0/5 | Gold: 0; color: #FFF; align: center; width: 8"></a-entity>

    <!-- Weapon Status -->
    <a-entity id="weaponStatus" position="0 3.7 -5"
      text="value: Weapon: None (Find the sword!); color: #FF0000; align: center; width: 6"></a-entity>

    <!-- Quest Complete Indicator -->
    <a-entity id="questComplete" position="0 3.2 -5" text="value: ; color: #00FF00; align: center; width: 6"></a-entity>

    <!-- Message Box -->
    <a-entity id="messageBox" position="0 2 -3" visible="false"
      text="value: ; color: #FFFF00; align: center; width: 6"></a-entity>

    <!-- Instructions -->
    <a-entity position="0 3 -3">
      <a-text value="WASD to move | Click items to collect | Click enemies to attack" align="center" color="#AAA"
        width="4"></a-text>
    </a-entity>

    <!-- ==================== START SCREEN ==================== -->

    <a-entity id="startScreen" position="0 2 -3" visible="true">
      <a-plane width="6" height="4" color="#000" opacity="0.9"></a-plane>
      <a-text value="QUEST OF THE REALM" position="0 1 0.01" align="center" color="#FFD700" width="8"></a-text>
      <a-text value="Collect 3 crystals & defeat 5 enemies" position="0 0.3 0.01" align="center" color="#FFF"
        width="4"></a-text>
      <a-text value="Find the sword to battle enemies!" position="0 0 0.01" align="center" color="#FF6666"
        width="3"></a-text>
      <a-text value="Click to Start Quest" position="0 -1 0.01" align="center" color="#00FF00" width="4"></a-text>
      <a-entity id="startButton" start-quest position="0 -1 0.02" geometry="primitive: plane; width: 3; height: 0.6"
        material="color: #4CC3D9" class="clickable"></a-entity>
    </a-entity>

    <!-- ==================== VICTORY SCREEN ==================== -->

    <a-entity id="victoryScreen" position="0 2 -3" visible="false">
      <a-plane width="6" height="3.5" color="#000" opacity="0.95"></a-plane>
      <a-text value="QUEST COMPLETE!" position="0 1 0.01" align="center" color="#FFD700" width="8"></a-text>
      <a-text value="You have saved the realm!" position="0 0.3 0.01" align="center" color="#FFF" width="4"></a-text>
      <a-entity id="finalScore" position="0 -0.3 0.01"
        text="value: Gold: 0; color: #FFD700; align: center; width: 5"></a-entity>
      <a-text value="Refresh to play again" position="0 -1 0.01" align="center" color="#AAA" width="3"></a-text>
    </a-entity>

    <!-- ==================== LIGHTING ==================== -->

    <a-light type="ambient" color="#404060" intensity="0.6"></a-light>
    <a-light type="point" color="#FFD700" intensity="0.5" position="0 5 -10"></a-light>
    <a-light type="point" color="#9400D3" intensity="0.3" position="0 2 -28"></a-light>

    <!-- ==================== CAMERA & PLAYER ==================== -->

    <a-entity id="player" player-controller="speed: 0.15" position="0 1 0">
      <a-entity camera look-controls wasd-controls="enabled: false">
        <!-- Cursor -->
        <a-entity id="cursor" position="0 0 -1" geometry="primitive: ring; radiusOuter: 0.015; radiusInner: 0.008"
          material="color: #FFF; shader: flat; transparent: true; opacity: 0.8"
          raycaster="objects: .clickable, .quest-item, .enemy, .npc, [finish-point], [spawn-point], [weapon-pickup]">
        </a-entity>
      </a-entity>
    </a-entity>

  </a-scene>
  <script>
    // Configure the inspector to not auto-open on example/game pages
    window.AFRAME_INSPECTOR_CONFIG = {
      exampleMode: true
    };
  </script>
  <script src="../../dist/aframe-inspector.js"></script>
</body>

</html>
