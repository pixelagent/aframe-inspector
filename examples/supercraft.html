<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>Supercraft - Example Scene</title>
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
</head>

<body>
  <a-scene>
    <!-- Simple craft scene as alternative -->
    <a-sky color="#87CEEB"></a-sky>

    <!-- Ground -->
    <a-plane position="0 0 -10" rotation="-90 0 0" width="30" height="30" color="#228B22"></a-plane>

    <!-- Simple buildings -->
    <a-box position="-3 1 -8" width="2" height="2" depth="2" color="#8B4513"></a-box>
    <a-cone position="-3 2.5 -8" radius-bottom="1.5" height="1" color="#654321"></a-cone>

    <a-box position="3 1.5 -10" width="3" height="3" depth="3" color="#A0522D"></a-box>
    <a-cone position="3 3.5 -10" radius-bottom="2" height="1" color="#8B4513"></a-cone>

    <!-- Trees -->
    <a-cone position="-8 2 -12" radius-bottom="1" height="4" color="#006400"></a-cone>
    <a-cone position="8 2 -15" radius-bottom="1.5" height="5" color="#006400"></a-cone>

    <!-- Character placeholder -->
    <a-cylinder position="0 0.75 -5" radius="0.3" height="1.5" color="#4169E1"></a-cylinder>
    <a-sphere position="0 1.75 -5" radius="0.4" color="#FFDAB9"></a-sphere>

    <!-- Lights -->
    <a-light type="ambient" color="#FFF" intensity="0.5"></a-light>
    <a-light type="point" position="0 5 0" intensity="0.8"></a-light>

    <!-- Sun -->
    <a-sphere position="-10 15 -20" radius="3" color="#FFD700" shader="flat"></a-sphere>
    <a-light type="directional" color="#FFD700" intensity="0.8" position="-10 15 -20"></a-light>

    <!-- Camera -->
    <a-entity position="0 1.6 0">
      <a-camera>
        <a-cursor></a-cursor>
      </a-camera>
    </a-entity>
  </a-scene>
  <script src="../dist/aframe-inspector.js"></script>
</body>

</html>
