<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Laser Input UI</title>
  </head>
  <body>
    <div class="info-message">
      <h1>VR Laser Controls</h1>
      <p>Use your VR controller's laser pointer to interact with the UI.</p>
      <p>Point at a movie poster to see more info.</p>
    </div>
    <style>
      .info-message {
        font-family: sans-serif;
        color: white;
        background: rgba(0, 0, 0, 0.7);
        padding: 20px;
        border-radius: 10px;
      }
      .info-message h1 {
        font-size: 24px;
        margin: 0 0 10px;
        color: #118A7E;
      }
      .info-message p {
        font-size: 16px;
        margin: 5px 0;
      }
    </style>
  </body>
</html>
