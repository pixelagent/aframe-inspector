<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>Example Scene</title>
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
</head>

<body>
  <a-scene shadow="type: pcfsoft" debug="true">
    <!-- Ground plane -->
    <a-plane position="0 0 0" rotation="-90 0 0" width="20" height="20" color="#7BC8A4" shadow="receive: true"></a-plane>

    <!-- Colored cubes with shadow casting -->
    <a-entity id="hsl-green" geometry="primitive: box" material="color: hsl(120, 100%, 75%)"
      position="-4 0.5 0" shadow="cast: true"></a-entity>
    <a-entity id="rgb-yellow" geometry="primitive: box" material="color: rgb(255, 255, 0)" position="-2 0.5 0" shadow="cast: true"></a-entity>
    <a-entity id="hex3-red" geometry="primitive: box" material="color: #f00" position="0 0.5 0" shadow="cast: true"></a-entity>
    <a-entity id="hex6-red" geometry="primitive: box" material="color: #ff0000" position="2 0.5 0" shadow="cast: true"></a-entity>
    <a-entity id="string-blue" geometry="primitive: box" material="color: blue" position="4 0.5 0" shadow="cast: true"></a-entity>

    <!-- Lighting -->
    <a-entity light="type: ambient; color: #BBB"></a-entity>
    <a-entity light="type: directional; color: #FFF; intensity: 0.6; castShadow: true" position="-1 4 2"></a-entity>

    <!-- Camera positioned to see all cubes -->
    <a-entity position="0 2 6">
      <a-camera look-controls wasd-controls></a-camera>
    </a-entity>
  </a-scene>
  <script src="../dist/aframe-inspector.js"></script>
</body>

</html>
